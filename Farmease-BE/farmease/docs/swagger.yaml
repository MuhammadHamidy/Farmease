info:
  contact: {}
paths:
  /api/akun:
    get:
      consumes:
      - application/json
      description: Retrieve all accounts with their roles
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/domain.Akun'
            type: array
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/responses.Response-any'
      security:
      - ApiKeyAuth: []
      summary: Get list of all accounts
      tags:
      - accounts
    post:
      consumes:
      - application/json
      description: Register a new account with role and operator category
      parameters:
      - description: Account details
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/domain.Akun'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/domain.Akun'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/responses.Response-any'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/responses.Response-any'
      security:
      - ApiKeyAuth: []
      summary: Create a new account
      tags:
      - accounts
  /api/auth/login:
    post:
      consumes:
      - application/json
      description: Authenticate user with username and password
      parameters:
      - description: Login credentials
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/domain.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/domain.LoginResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/responses.Response-any'
      summary: Login and get JWT token
      tags:
      - auth
  /api/auth/login-operator:
    post:
      consumes:
      - application/json
      description: Authenticate operator with only operator_id (username)
      parameters:
      - description: Login credentials
        in: body
        name: request
        required: true
        schema:
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/domain.LoginResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/responses.Response-any'
      summary: Login as Operator without password
      tags:
      - auth
  /api/domba:
    get:
      consumes:
      - application/json
      description: Retrieve all sheep with filtering by pen, gender, and status
      parameters:
      - description: Filter by pen ID
        in: query
        name: id_kandang
        type: integer
      - description: Filter by gender (Jantan/Betina)
        in: query
        name: jenis_kelamin
        type: string
      - description: Filter by status
        in: query
        name: status
        type: string
      - description: Search by tag or nickname
        in: query
        name: search
        type: string
      - description: Page number
        in: query
        name: page
        type: integer
      - description: Items per page
        in: query
        name: per_page
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/domain.Domba'
            type: array
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/responses.Response-any'
      security:
      - ApiKeyAuth: []
      summary: Get list of all sheep
      tags:
      - dombas
    post:
      consumes:
      - application/json
      description: Create a new sheep entry with initial details
      parameters:
      - description: Sheep details
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/domain.Domba'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/domain.Domba'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/responses.Response-any'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/responses.Response-any'
      security:
      - ApiKeyAuth: []
      summary: Register a new sheep
      tags:
      - dombas
  /api/domba/{id_domba}/pemberian-pakan:
    get:
      consumes:
      - application/json
      description: Retrieve feeding history for a specific sheep
      parameters:
      - description: Sheep ID
        in: path
        name: id_domba
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/domain.PemberianPakan'
            type: array
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/responses.Response-any'
      security:
      - ApiKeyAuth: []
      summary: Get feeding history
      tags:
      - feeds
    post:
      consumes:
      - application/json
      description: Record that a sheep has been fed
      parameters:
      - description: Sheep ID
        in: path
        name: id_domba
        required: true
        type: integer
      - description: Feeding details
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/domain.PemberianPakan'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/domain.PemberianPakan'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/responses.Response-any'
        "422":
          description: Unprocessable Entity
          schema:
            $ref: '#/definitions/responses.Response-any'
      security:
      - ApiKeyAuth: []
      summary: Record feeding
      tags:
      - feeds
  /api/domba/{id}:
    get:
      consumes:
      - application/json
      description: Retrieve specific sheep details by ID
      parameters:
      - description: Sheep ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/domain.Domba'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/responses.Response-any'
      security:
      - ApiKeyAuth: []
      summary: Get details of a sheep
      tags:
      - dombas
  /api/domba/{id}/berat-badan:
    get:
      consumes:
      - application/json
      description: Retrieve all weight records for a specific sheep
      parameters:
      - description: Sheep ID
        in: path
        name: id
